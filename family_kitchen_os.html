                  <div style={{ background: color, color: "white", borderRadius: 12, padding: "14px 16px", marginBottom: 12 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                      <h2 style={{ margin: 0, fontSize: 18 }}>{S.title}</h2>
                      <span style={{ fontFamily: "sans-serif", fontSize: 14, fontWeight: 700, opacity: 0.9 }}>{S.estCost}</span>
                    </div>
                    <div style={{ fontFamily: "sans-serif", fontSize: 11, opacity: 0.85, marginTop: 5, lineHeight: 1.5 }}>
                      <b>When:</b> {S.when}<br />
                      <b>Where:</b> {S.where}
                    </div>
                    <div style={{ marginTop: 8, padding: "8px 10px", background: "rgba(255,255,255,0.12)", borderRadius: 8, fontFamily: "sans-serif", fontSize: 11, opacity: 0.9, lineHeight: 1.5 }}>
                      {S.rationale}
                    </div>
                  </div>

                  {S.sections.map((sec, si) => {
                    const catKey = `${shopTab}-${si}`;
                    const isOpen = openCat[catKey] !== false;  // default open
                    return (
                      <div key={si} style={{ background: "white", borderRadius: 10, marginBottom: 8, overflow: "hidden", boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
                        <button onClick={() => toggleCat(catKey)} style={{ width: "100%", padding: "11px 14px", background: "#fafafa", border: "none", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                          <span style={{ fontFamily: "sans-serif", fontSize: 11, fontWeight: 700, color, letterSpacing: 0.8 }}>{sec.cat.toUpperCase()}</span>
                          <span style={{ color, fontSize: 14 }}>{isOpen ? "▲" : "▼"}</span>
                        </button>
                        {isOpen && sec.items.map((item, ii) => {
                          const key = `${catKey}-${ii}`;
                          const done = checked[key];
                          return (
                            <div key={ii} onClick={() => toggleCheck(key)}
                              style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", borderTop: "1px solid #f5f5f5", cursor: "pointer", opacity: done ? 0.4 : 1, transition: "opacity 0.2s" }}>
                              <div style={{ width: 18, height: 18, border: `2px solid ${done ? color : "#ddd"}`, borderRadius: 4, flexShrink: 0, background: done ? color : "white", display: "flex", alignItems: "center", justifyContent: "center" }}>
                                {done && <span style={{ color: "white", fontSize: 11, lineHeight: 1 }}>✓</span>}
                              </div>
                              <span style={{ fontFamily: "sans-serif", fontSize: 13, color: "#333", textDecoration: done ? "line-through" : "none", lineHeight: 1.4 }}>{item}</span>
                            </div>
                          );
                        })}
                      </div>
                    );
                  })}

                  <button onClick={resetWeekChecks}
                    style={{ marginTop: 12, padding: "10px 14px", background: "white", border: `1px solid ${color}`, borderRadius: 8, color, fontFamily: "sans-serif", fontSize: 12, fontWeight: 600, cursor: "pointer", width: "100%" }}>
                    Reset this list
                  </button>

                  <div style={{ marginTop: 14, padding: "12px 14px", background: "#f0fff4", border: "1px solid #9ae6b4", borderRadius: 10 }}>
                    <div style={{ fontFamily: "sans-serif", fontSize: 11, fontWeight: 700, color: "#276749", marginBottom: 4, letterSpacing: 0.5 }}>💡 RHYTHM</div>
                    <p style={{ margin: 0, fontFamily: "sans-serif", fontSize: 12, color: "#2f855a", lineHeight: 1.55 }}>
                      Annualised: weekly fresh ~$40/wk + mid-week ~$20/wk + monthly ($240÷4) ~$60/wk = <b>~$120/week amortised</b>. Well under your $250 weekly ceiling.
                    </p>
                  </div>
                </>
              );
            })()}
          </div>
        )}

        {/* ───────────── SUNDAY BATCH ───────────── */}
        {tab === "batch" && (
          <div>
            <div style={{ background: "#e63946", color: "white", borderRadius: 12, padding: "14px 16px", marginBottom: 14 }}>
              <div style={{ fontFamily: "sans-serif", fontSize: 10, opacity: 0.75, letterSpacing: 1.2 }}>EVERY SUNDAY · 4:00 – 5:30 PM</div>
              <h2 style={{ margin: "4px 0 5px", fontSize: 18 }}>The 90-Min Family Reset</h2>
              <p style={{ margin: 0, fontFamily: "sans-serif", fontSize: 12, opacity: 0.85, lineHeight: 1.5 }}>
                One session runs the entire week. Skip it and every morning is hard.
              </p>
            </div>

            {SUNDAY_BATCH.map((t, i) => (
              <div key={i} style={{ background: "white", borderRadius: 10, padding: "13px 14px", marginBottom: 9, display: "flex", gap: 12, alignItems: "flex-start", boxShadow: "0 1px 5px rgba(0,0,0,0.06)" }}>
                <div style={{ background: "#fff0f0", borderRadius: 8, padding: "6px 10px", textAlign: "center", flexShrink: 0, minWidth: 44 }}>
                  <div style={{ fontFamily: "sans-serif", fontSize: 17, fontWeight: 700, color: "#e63946", lineHeight: 1 }}>{t.mins}</div>
                  <div style={{ fontFamily: "sans-serif", fontSize: 8, color: "#e63946", letterSpacing: 0.5 }}>MIN</div>
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontFamily: "sans-serif", fontSize: 13, fontWeight: 600, color: "#222", marginBottom: 3 }}>{t.task}</div>
                  <div style={{ fontFamily: "sans-serif", fontSize: 11, color: "#888", lineHeight: 1.45 }}>Covers: {t.covers}</div>
                </div>
              </div>
            ))}

            <div style={{ background: "#f0fff4", border: "1px solid #9ae6b4", borderRadius: 12, padding: "14px 16px", marginTop: 8 }}>
              <div style={{ fontFamily: "sans-serif", fontSize: 11, fontWeight: 700, color: "#276749", marginBottom: 8, letterSpacing: 0.5 }}>WHAT COMES OUT OF SUNDAY</div>
              {BATCH_OUTPUTS.map((it, i) => (
                <div key={i} style={{ display: "flex", gap: 7, marginBottom: 6 }}>
                  <span style={{ color: "#38a169", flexShrink: 0, fontWeight: 700 }}>✓</span>
                  <span style={{ fontFamily: "sans-serif", fontSize: 12, color: "#2f855a", lineHeight: 1.45 }}>{it}</span>
                </div>
              ))}
            </div>

            <div style={{ background: "#1b2838", borderRadius: 12, padding: "14px 16px", marginTop: 12, color: "white" }}>
              <div style={{ fontFamily: "sans-serif", fontSize: 10, opacity: 0.45, marginBottom: 6, letterSpacing: 1.2 }}>THE SYSTEM IN ONE SENTENCE</div>
              <div style={{ fontFamily: "sans-serif", fontSize: 13, opacity: 0.88, lineHeight: 1.7 }}>
                Saturday's chicken soup batch covers Mon dinner. Sunday's 90-min batch covers Tue–Fri ingredients. You only actively cook 5 nights — and even those are 1 or 2 tracks max.
              </div>
            </div>
          </div>
        )}

        {/* ───────────── EMERGENCY ───────────── */}
        {tab === "rescue" && (
          <div>
            <div style={{ background: "#1a3309", color: "white", borderRadius: 12, padding: "14px 16px", marginBottom: 14 }}>
              <div style={{ fontFamily: "sans-serif", fontSize: 10, opacity: 0.65, letterSpacing: 1.2 }}>WHEN THE WHEELS COME OFF</div>
              <h2 style={{ margin: "4px 0 5px", fontSize: 18 }}>Emergency Meals · 0–12 min</h2>
              <p style={{ margin: 0, fontFamily: "sans-serif", fontSize: 12, opacity: 0.78, lineHeight: 1.5 }}>
                One list per person. All from Costco or Safeway. The floor — never miss protein, never skip a meal.
              </p>
            </div>

            {["wife", "husband", "boys"].map(who => {
              const c = COLORS[who];
              const meals = EMERGENCY[who];
              return (
                <div key={who} style={{ marginBottom: 16 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                    <div style={{ background: c.bg, color: c.fg, padding: "4px 10px", borderRadius: 6, fontFamily: "sans-serif", fontSize: 11, fontWeight: 700, letterSpacing: 0.5 }}>{c.tag}</div>
                    <div style={{ flex: 1, height: 1, background: c.bg }} />
                  </div>
                  {["B", "L", "L_school", "S", "D"].map(type => {
                    const typed = meals.filter(m => m.type === type);
                    if (typed.length === 0) return null;
                    const labels = { B: "BREAKFAST", L: "LUNCH", L_school: "SCHOOL LUNCH", S: "SNACK", D: "DINNER" };
                    return (
                      <div key={type}>
                        <div style={{ fontFamily: "sans-serif", fontSize: 10, fontWeight: 700, color: "#aaa", letterSpacing: 1, margin: "8px 0 4px" }}>{labels[type]}</div>
                        {typed.map((m, i) => (
                          <div key={i} style={{ background: "white", borderRadius: 8, padding: "10px 14px", marginBottom: 5, display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10, boxShadow: "0 1px 3px rgba(0,0,0,0.05)" }}>
                            <div style={{ flex: 1 }}>
                              <div style={{ fontFamily: "sans-serif", fontSize: 12, color: "#333", lineHeight: 1.45 }}>{m.meal}</div>
                              <div style={{ fontFamily: "sans-serif", fontSize: 10, color: "#999", marginTop: 2 }}>⏱ {m.time}</div>
                            </div>
                            <div style={{ textAlign: "right", flexShrink: 0 }}>
                              <div style={{ fontFamily: "sans-serif", fontSize: 12, fontWeight: 700, color: c.fg }}>{m.p}</div>
                            </div>
                          </div>
                        ))}
                      </div>
                    );
                  })}
                </div>
              );
            })}

            <div style={{ background: "#e8f5e9", borderRadius: 10, padding: "12px 14px", marginTop: 8 }}>
              <p style={{ margin: 0, fontFamily: "sans-serif", fontSize: 12, color: "#1b5e20", lineHeight: 1.55 }}>
                <b>The floor rule:</b> On the absolute worst day — drink your water, eat 2 boiled eggs, have Amy's lentil soup. That's it. That's enough. Never let perfect be the enemy of the floor.
              </p>
            </div>
          </div>
        )}

        {/* ───────────── FAMILY PROFILES ───────────── */}
        {tab === "family" && (
          <div>
            <div style={{ background: "white", borderRadius: 12, padding: "14px 16px", marginBottom: 14, boxShadow: "0 1px 5px rgba(0,0,0,0.07)" }}>
              <h2 style={{ margin: "0 0 4px", fontSize: 18, color: "#1a3309" }}>The 4 plates</h2>
              <p style={{ margin: 0, fontFamily: "sans-serif", fontSize: 12, color: "#666", lineHeight: 1.5 }}>
                Different bodies, different goals, one kitchen. Each card shows the calculated needs and the non-negotiable rules.
              </p>
            </div>

            {FAMILY.map(p => {
              const c = COLORS[p.id];
              return (
                <div key={p.id} style={{ background: "white", borderRadius: 12, marginBottom: 12, overflow: "hidden", boxShadow: "0 1px 6px rgba(0,0,0,0.07)", borderLeft: `4px solid ${c.fg}` }}>
                  <div style={{ padding: "14px 16px", background: c.bg }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: 10 }}>
                      <div>
                        <div style={{ fontFamily: "sans-serif", fontSize: 10, color: c.fg, fontWeight: 700, letterSpacing: 1 }}>{c.tag}</div>
                        <h3 style={{ margin: "2px 0", fontSize: 18, color: c.fg }}>{p.emoji} {p.name}</h3>
                      </div>
                      <div style={{ textAlign: "right", fontFamily: "sans-serif", fontSize: 11, color: c.fg, opacity: 0.85, lineHeight: 1.4 }}>
                        {p.age} · {p.weight} · {p.height}
                      </div>
                    </div>
                    <div style={{ fontFamily: "sans-serif", fontSize: 11, color: c.fg, opacity: 0.85, marginTop: 6, lineHeight: 1.45 }}>{p.conditions}</div>
                    <div style={{ fontFamily: "sans-serif", fontSize: 11, color: c.fg, marginTop: 4, fontWeight: 600 }}>🎯 {p.goal}</div>
                  </div>

                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 1, background: "#f0f0f0" }}>
                    {[
                      { label: "BMR", v: p.bmr },
                      { label: "TDEE", v: p.tdee },
                      { label: "TARGET", v: p.target },
                    ].map((m, i) => (
                      <div key={i} style={{ background: "white", padding: "10px 8px", textAlign: "center" }}>
                        <div style={{ fontFamily: "sans-serif", fontSize: 9, color: "#999", letterSpacing: 1 }}>{m.label}</div>
                        <div style={{ fontFamily: "sans-serif", fontSize: 17, fontWeight: 700, color: c.fg, marginTop: 2 }}>{m.v}</div>
                        <div style={{ fontFamily: "sans-serif", fontSize: 9, color: "#aaa" }}>cal</div>
                      </div>
                    ))}
                  </div>

                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 1, background: "#f0f0f0" }}>
                    {[
                      { label: "PROTEIN", v: p.protein, unit: "g" },
                      { label: "CARBS", v: p.carbs, unit: "g" },
                      { label: "FAT", v: p.fat, unit: "g" },
                    ].map((m, i) => (
                      <div key={i} style={{ background: "white", padding: "10px 8px", textAlign: "center" }}>
                        <div style={{ fontFamily: "sans-serif", fontSize: 9, color: "#999", letterSpacing: 1 }}>{m.label}</div>
                        <div style={{ fontFamily: "sans-serif", fontSize: 16, fontWeight: 700, color: c.fg, marginTop: 2 }}>{m.v}{m.unit}</div>
                      </div>
                    ))}
                  </div>

                  <div style={{ padding: "12px 16px", background: "#fafaf7" }}>
                    <div style={{ fontFamily: "sans-serif", fontSize: 10, fontWeight: 700, color: "#999", letterSpacing: 1, marginBottom: 6 }}>RULES</div>
                    {p.rules.map((r, j) => (
                      <div key={j} style={{ display: "flex", gap: 7, marginBottom: 4 }}>
                        <span style={{ color: c.fg, flexShrink: 0 }}>·</span>
                        <span style={{ fontFamily: "sans-serif", fontSize: 12, color: "#444", lineHeight: 1.5 }}>{r}</span>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}

            <div style={{ background: "#fff3cd", border: "1px solid #f0c060", borderRadius: 10, padding: "12px 14px", marginTop: 8 }}>
              <p style={{ margin: 0, fontFamily: "sans-serif", fontSize: 12, color: "#664d03", lineHeight: 1.55 }}>
                <b>⚕️ Medical disclaimer:</b> These are the targets from your existing plan. Any changes to medication timing or dosing must be confirmed with the prescribing physician.
              </p>
            </div>
          </div>
        )}

      </div>

      <div style={{ textAlign: "center", padding: "14px 12px", fontFamily: "sans-serif", fontSize: 10, color: "#bbb", lineHeight: 1.6 }}>
        Family of 4 · Vancouver BC · Costco + Safeway · Week 1 plan locked · v1
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<FamilyKitchenOS />);
  </script>
</body>
</html>
